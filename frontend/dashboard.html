<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EduLearn</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">📚 EduLearn</div>
            <ul>
                <li><a href="index.html" data-i18n="nav_home">Home</a></li>
                <li><a href="courses.html" data-i18n="nav_courses">Courses</a></li>
            </ul>
            <div class="nav-right">
                <div class="language-toggle">
                    <button class="btn-outline" onclick="changeLanguage('en')">EN</button>
                    <button class="btn-outline" onclick="changeLanguage('hi')">HI</button>
                </div>
                <div class="auth-buttons">
                    <button class="btn-outline" onclick="logout()">Logout</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="container" style="margin: 2rem auto;">
        <div class="dashboard">
            <div class="sidebar">
                <h3 data-i18n="dashboard_title">My Dashboard</h3>
                <ul>
                    <li><a href="#" onclick="showSection('enrolled')" class="active" data-i18n="dashboard_enrolled">Enrolled Courses</a></li>
                    <li><a href="#" onclick="showSection('profile')" data-i18n="dashboard_profile">My Profile</a></li>
                </ul>
            </div>

            <div class="main-content">
                <div id="enrolledSection">
                    <h2 data-i18n="dashboard_enrolled">Enrolled Courses</h2>
                    <div id="enrolledCourses" class="courses-grid">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>

                <div id="profileSection" class="hidden">
                    <h2 data-i18n="dashboard_profile">My Profile</h2>
                    <div id="profileForm" style="max-width: 600px;">
                        <div class="form-group">
                            <label data-i18n="profile_firstname">First Name</label>
                            <input type="text" id="firstName">
                        </div>

                        <div class="form-group">
                            <label data-i18n="profile_lastname">Last Name</label>
                            <input type="text" id="lastName">
                        </div>

                        <div class="form-group">
                            <label data-i18n="profile_email">Email</label>
                            <input type="email" id="email" disabled>
                        </div>

                        <div class="form-group">
                            <label data-i18n="profile_phone">Phone</label>
                            <input type="tel" id="phone">
                        </div>

                        <div class="form-group">
                            <label data-i18n="profile_language">Preferred Language</label>
                            <select id="language">
                                <option value="en">English</option>
                                <option value="hi">हिन्दी</option>
                            </select>
                        </div>

                        <button class="btn-primary" onclick="updateProfile()" data-i18n="profile_update">
                            Update Profile
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 EduLearn. All rights reserved.</p>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
    <script>
        checkAuth();

        async function loadEnrolledCourses() {
            try {
                const response = await apiCall('/user/enrollments', {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                if (response && Array.isArray(response)) {
                    displayEnrolledCourses(response);
                }
            } catch (error) {
                console.error('Error loading enrollments:', error);
            }
        }

        function displayEnrolledCourses(enrollments) {
            const container = document.getElementById('enrolledCourses');
            container.innerHTML = '';

            if (enrollments.length === 0) {
                container.innerHTML = '<p>No courses enrolled yet. <a href="courses.html">Browse Courses</a></p>';
                return;
            }

            enrollments.forEach(enrollment => {
                const card = document.createElement('div');
                card.className = 'course-card';
                card.innerHTML = `
                    <div class="course-card-header">
                        <h3>Progress: ${enrollment.progress_percentage}%</h3>
                    </div>
                    <div class="course-card-body">
                        <h4>Course ID: ${enrollment.course_id}</h4>
                        <p>Enrolled: ${new Date(enrollment.enrollment_date).toLocaleDateString()}</p>
                        <div style="margin-top: 1rem;">
                            <div style="background: #e0e0e0; height: 10px; border-radius: 5px; overflow: hidden;">
                                <div style="background: #667eea; height: 100%; width: ${enrollment.progress_percentage}%;"></div>
                            </div>
                        </div>
                        <button class="btn-primary" onclick="continueCourse(${enrollment.course_id})"
                            style="width: 100%; margin-top: 1rem;">
                            Continue
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function loadProfile() {
            try {
                const response = await apiCall('/user/profile', {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                if (response) {
                    document.getElementById('firstName').value = response.first_name;
                    document.getElementById('lastName').value = response.last_name;
                    document.getElementById('email').value = response.email;
                    document.getElementById('phone').value = response.phone || '';
                    document.getElementById('language').value = response.preferred_language;
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        async function updateProfile() {
            try {
                const response = await apiCall('/user/profile', {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${getToken()}` },
                    body: JSON.stringify({
                        first_name: document.getElementById('firstName').value,
                        last_name: document.getElementById('lastName').value,
                        phone: document.getElementById('phone').value,
                        preferred_language: document.getElementById('language').value
                    })
                });

                if (response) {
                    showMessage('Profile updated successfully');
                }
            } catch (error) {
                console.error('Error updating profile:', error);
                showMessage('Error updating profile', 'error');
            }
        }

        function continueCourse(courseId) {
            window.location.href = `course-detail.html?id=${courseId}`;
        }

        function showSection(section) {
            document.getElementById('enrolledSection').classList.toggle('hidden', section !== 'enrolled');
            document.getElementById('profileSection').classList.toggle('hidden', section !== 'profile');

            document.querySelectorAll('.sidebar a').forEach(link => {
                link.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        window.addEventListener('load', () => {
            loadEnrolledCourses();
            loadProfile();
            translatePage();
        });
    </script>
</body>
</html>
