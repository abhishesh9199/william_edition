<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Courses - EduLearn</title>
    <link rel="stylesheet" href="css/modern.css">
    <style>
        .courses-section {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            min-height: 80vh;
        }

        .filters {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .filter-group {
            margin-bottom: 2rem;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .filter-group select {
            width: 100%;
            padding: 0.65rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 0.95rem;
            background: white;
            cursor: pointer;
        }

        .courses-content {
            display: flex;
            flex-direction: column;
        }

        .courses-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .courses-header h1 {
            font-size: 2rem;
            color: var(--text-primary);
        }

        .sort-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .sort-controls select {
            padding: 0.65rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background: white;
            cursor: pointer;
        }

        .courses-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 3rem;
            background: var(--light-bg);
            border-radius: 1rem;
            border: 1px solid var(--border-color);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .courses-count {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        @media (max-width: 1024px) {
            .courses-section {
                grid-template-columns: 200px 1fr;
                gap: 1.5rem;
            }

            .filters {
                padding: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .courses-section {
                grid-template-columns: 1fr;
            }

            .filters {
                position: static;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 1rem;
                padding: 1.5rem;
            }

            .filter-group {
                margin-bottom: 0;
            }

            .courses-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .courses-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <header>
        <nav>
            <div class="logo">
                <span style="font-size: 1.8rem;">🎓</span>
                <span>EduLearn</span>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="index.html#features">Features</a></li>
            </ul>
            <div class="nav-right">
                <div class="language-toggle">
                    <button class="btn-outline" onclick="changeLanguage('en')">EN</button>
                    <button class="btn-outline" onclick="changeLanguage('hi')">HI</button>
                </div>
                <div class="auth-buttons">
                    <button class="btn-outline" onclick="redirectTo('auth.html')">Login</button>
                    <button class="btn-secondary" onclick="redirectTo('auth.html')">Sign Up</button>
                </div>
            </div>
        </nav>
    </header>

    <main style="padding: 2rem 0;">
        <div class="container">
            <!-- Filters & Courses -->
            <div class="courses-section">
                <!-- Filters -->
                <div class="filters">
                    <h3 style="margin-bottom: 1.5rem; color: var(--text-primary);">🔍 Filters</h3>
                    
                    <div class="filter-group">
                        <label for="subjectFilter">Subject</label>
                        <select id="subjectFilter" onchange="applyFilters()">
                            <option value="">All Subjects</option>
                            <option value="Math">🔢 Math</option>
                            <option value="English">📚 English</option>
                            <option value="Science">🔬 Science</option>
                            <option value="Physics">⚛️ Physics</option>
                            <option value="Chemistry">🧪 Chemistry</option>
                            <option value="Biology">🧬 Biology</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="boardFilter">Board</label>
                        <select id="boardFilter" onchange="applyFilters()">
                            <option value="">All Boards</option>
                            <option value="CBSE">CBSE</option>
                            <option value="ICSE">ICSE</option>
                            <option value="State">State</option>
                            <option value="Olympiad">🏆 Olympiad</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="gradeFilter">Grade Level</label>
                        <select id="gradeFilter" onchange="applyFilters()">
                            <option value="">All Grades</option>
                            <option value="3-5">Classes 3-5 (Primary)</option>
                            <option value="6-8">Classes 6-8 (Upper Primary)</option>
                            <option value="9-10">Classes 9-10 (Secondary)</option>
                            <option value="11-12">Classes 11-12 (Senior)</option>
                        </select>
                    </div>
                </div>

                <!-- Courses List -->
                <div class="courses-content">
                    <div class="courses-header">
                        <div>
                            <h1>📚 All Courses</h1>
                            <p class="courses-count"><span id="courseCount">0</span> courses found</p>
                        </div>
                        <div class="sort-controls">
                            <select id="sortBy" onchange="applySorting()">
                                <option value="popular">Popular</option>
                                <option value="newest">Newest</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="rating">Top Rated</option>
                            </select>
                        </div>
                    </div>

                    <div class="courses-list" id="coursesList">
                        <div class="loading" style="grid-column: 1/-1;">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer style="margin-top: 4rem;">
        <div class="container">
            <p>&copy; 2024 EduLearn. All rights reserved.</p>
            <p>Empowering students to achieve their dreams through quality education</p>
        </div>
    </footer>

    <script>
        const API_BASE = 'http://localhost:8000';
        let allCourses = [];

        async function loadCourses() {
            try {
                const response = await fetch(`${API_BASE}/courses`);
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                allCourses = await response.json();
                displayCourses(allCourses);
            } catch (error) {
                console.error('Error loading courses:', error);
                document.getElementById('coursesList').innerHTML =
                    '<div class="error-message" style="grid-column: 1/-1;">Unable to load courses. Please refresh the page.</div>';
            }
        }

        function displayCourses(courses) {
            const container = document.getElementById('coursesList');
            document.getElementById('courseCount').textContent = courses.length;

            if (courses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>😔 No courses found</h3>
                        <p>Try adjusting your filters or check back soon for new courses!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = courses.map(course => createCourseCard(course)).join('');
        }

        function createCourseCard(course) {
            const emoji = getSubjectEmoji(course.subject);
            const price = course.price ? `₹${course.price}` : 'Free';
            const rating = (Math.random() * 2 + 3.5).toFixed(1);
            const students = Math.floor(Math.random() * 500) + 50;

            return `
                <div class="course-card fade-in-up">
                    <div class="course-card-header">
                        <h3>${emoji}</h3>
                        <h4>${course.subject}</h4>
                    </div>
                    <div class="course-card-body">
                        <h4>${course.title}</h4>
                        <p>${course.description.substring(0, 100)}...</p>
                        <div class="course-meta">
                            <span class="badge badge-primary">${course.board}</span>
                            <span class="badge">Grade: ${course.grade_level}</span>
                            <span class="badge" style="background: #fef08a; color: #b45309; border-color: #facc15;">
                                ⏱️ ${course.duration_hours}h
                            </span>
                        </div>
                        <div style="margin: 1rem 0; display: flex; align-items: center; justify-content: space-between;">
                            <div>
                                <div style="color: #667eea; font-weight: 700; font-size: 1.2rem;">
                                    ${price}
                                </div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">
                                    ⭐ ${rating} (${students} students)
                                </div>
                            </div>
                        </div>
                        <button class="btn-primary" onclick="viewCourse(${course.id})"
                            style="width: 100%; margin-top: auto;">
                            View Course →
                        </button>
                    </div>
                </div>
            `;
        }

        function getSubjectEmoji(subject) {
            const emojiMap = {
                'Math': '🔢',
                'English': '📚',
                'Science': '🔬',
                'Physics': '⚛️',
                'Chemistry': '🧪',
                'Biology': '🧬',
                'Social Studies': '🌍',
                'Hindi': '📖',
                'History': '🏛️'
            };
            return emojiMap[subject] || '📚';
        }

        function applyFilters() {
            const subject = document.getElementById('subjectFilter').value;
            const board = document.getElementById('boardFilter').value;
            const grade = document.getElementById('gradeFilter').value;

            const filtered = allCourses.filter(course => {
                return (!subject || course.subject === subject) &&
                       (!board || course.board === board) &&
                       (!grade || course.grade_level === grade);
            });

            displayCourses(filtered);
        }

        function applySorting() {
            const sortBy = document.getElementById('sortBy').value;
            let sorted = [...allCourses];

            switch(sortBy) {
                case 'price-low':
                    sorted.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    sorted.sort((a, b) => b.price - a.price);
                    break;
                case 'newest':
                    sorted.reverse();
                    break;
                default:
                    sorted.sort(() => Math.random() - 0.5);
            }

            displayCourses(sorted);
        }

        function viewCourse(courseId) {
            window.location.href = `courses.html?id=${courseId}`;
        }

        function redirectTo(path) {
            window.location.href = path;
        }

        function changeLanguage(lang) {
            localStorage.setItem('language', lang);
            alert(`Language changed to ${lang === 'en' ? 'English' : 'Hindi'}`);
        }

        // Load courses on page load
        window.addEventListener('load', loadCourses);
    </script>
</body>
</html>
